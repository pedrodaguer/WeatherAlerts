name: Weather Alert

on:
  schedule:
    - cron: "45 5 * * *"
  workflow_dispatch:

jobs:
  send-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weather alert
        env:
          PHONE_NUMBER_1: ${{ secrets.PHONE_NUMBER_1 }}
          PHONE_NUMBER_2: ${{ secrets.PHONE_NUMBER_2 }}
          CALLMEBOT_API_KEY_1: ${{ secrets.CALLMEBOT_API_KEY_1 }}
          CALLMEBOT_API_KEY_2: ${{ secrets.CALLMEBOT_API_KEY_2 }}
        run: python app.py
